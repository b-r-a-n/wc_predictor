name: Refresh team data (ELO)

# Daily refresh of ELO ratings — the most match-sensitive strategy input — into
# teams.json. The other inputs (Transfermarkt market values, Sofascore form) come
# from sites that 403 datacenter IPs, and FIFA's source is a small static top-20,
# so those are left untouched here and refreshed by running the full scrape +
# merge locally (see CLAUDE.md). Rather than re-run the full merge, this job
# patches just each team's elo_rating in place via scrapers/apply_elo.py.
#
# apply_elo self-guards (minimum matched teams, valid ELO range, no implausible
# average swing) and validate enforces the schema, so a degraded scrape fails the
# job and commits nothing.
on:
  schedule:
    # 07:00 UTC daily — offset from the 09:00 results scrape so the two jobs
    # don't push/deploy at the same moment.
    - cron: '0 7 * * *'
  workflow_dispatch:

# Don't let two refreshes race on the same push.
concurrency:
  group: refresh-team-data
  cancel-in-progress: false

permissions:
  contents: write
  actions: write   # needed for `gh workflow run` to dispatch deploy.yml

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        # The scrapers.cli package __init__ imports every CLI module, so the
        # full requirements set must be present even though we only run ELO.
        run: pip install -r scrapers/requirements.txt

      - name: Scrape ELO ratings
        # international-football.net scrapes fine from GitHub's runners. A hard
        # failure here stops the job before any commit (the safe outcome).
        run: PYTHONPATH=$PWD python -m scrapers.cli.scrape_elo

      - name: Apply ELO to teams.json
        # Patches elo_rating in place, leaving all other fields untouched.
        # Self-guards against a degraded scrape and exits non-zero on any doubt.
        run: |
          PYTHONPATH=$PWD python -m scrapers.apply_elo \
            --teams data/teams.json \
            --elo scrapers/output/elo_ratings.json \
            --min-teams 45

      - name: Sync to web/public
        run: cp data/teams.json web/public/data/teams.json

      - name: Validate schema (hard gate)
        run: PYTHONPATH=$PWD python -m scrapers.cli.validate web/public/data/teams.json --summary

      - name: Commit updated team data
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/teams.json web/public/data/teams.json; then
            echo "ELO unchanged — nothing to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git add data/teams.json web/public/data/teams.json
          git commit -m "Update ELO ratings ($(date -u +%Y-%m-%d))"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger deploy
        # Pushes made with GITHUB_TOKEN don't trigger other workflows, so the
        # Pages deploy is dispatched explicitly. Only when ELO changed.
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main
