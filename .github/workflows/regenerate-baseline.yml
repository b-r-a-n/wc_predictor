name: Regenerate baseline simulation

on:
  push:
    branches:
      - main
    paths:
      - 'data/teams.json'
      - 'crates/**'
      - 'scripts/generate_baseline.sh'
      - '.github/workflows/regenerate-baseline.yml'
  workflow_dispatch:
    inputs:
      iterations:
        description: 'Number of iterations to run'
        required: false
        default: '500000'

permissions:
  contents: write
  actions: write   # needed for `gh workflow run` to dispatch deploy.yml

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Run baseline simulation
        env:
          ITERATIONS: ${{ github.event.inputs.iterations || '500000' }}
        run: ./scripts/generate_baseline.sh

      - name: Commit updated baseline
        id: commit
        env:
          ITERATIONS: ${{ github.event.inputs.iterations || '500000' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Compare everything except the volatile metadata (generated_at,
          # git_sha), so we don't commit/redeploy when only the timestamp
          # changed but the simulation results and config are identical.
          git show HEAD:web/public/data/baseline_results.json 2>/dev/null \
            | jq -S 'del(.generated_at, .git_sha)' > old_baseline.json 2>/dev/null \
            || echo '{}' > old_baseline.json
          jq -S 'del(.generated_at, .git_sha)' web/public/data/baseline_results.json > new_baseline.json
          if diff -q old_baseline.json new_baseline.json >/dev/null 2>&1; then
            echo "Baseline data unchanged — nothing to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            rm -f old_baseline.json new_baseline.json
            exit 0
          fi
          rm -f old_baseline.json new_baseline.json
          git add web/public/data/baseline_results.json
          git commit -m "Regenerate baseline simulation ($ITERATIONS iterations)"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger deploy
        # Pushes made with GITHUB_TOKEN don't trigger other workflows, so the
        # Pages deploy is dispatched explicitly. Only when the baseline changed.
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main
